<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相場表アプリ v0.1（野田ヤード）</title>
<style>
  :root{
    --bg:#0f1115; --panel:#1a1d24; --panel2:#222631; --line:#2c313c;
    --txt:#e7e9ee; --muted:#9aa3b2; --accent:#3b82f6; --accent2:#22c55e;
    --warn:#f59e0b; --new:#ef4444; --chip:#2a2f3a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;font-size:15px}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(#161922,#12151c);border-bottom:1px solid var(--line);padding:10px 14px}
  .title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .title small{font-size:12px;color:var(--muted);font-weight:400}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;align-items:center}
  input,select,button,textarea{font-family:inherit;font-size:14px}
  .search{flex:1;min-width:200px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--txt)}
  .search::placeholder{color:var(--muted)}
  .btn{padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent)}
  .btn.green{background:var(--accent2);border-color:var(--accent2);color:#06210f}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{padding:6px 11px;border-radius:999px;background:var(--chip);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:13px}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .awtoggle{display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .awtoggle button{padding:9px 12px;background:var(--panel);color:var(--muted);border:0;cursor:pointer}
  .awtoggle button.on{background:var(--accent2);color:#06210f;font-weight:700}
  main{padding:10px 12px 80px}
  .meta{color:var(--muted);font-size:12px;margin:6px 2px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{position:sticky;top:0;font-size:12px;color:var(--muted);background:var(--panel);font-weight:600}
  tr.row:hover{background:#171b24;cursor:pointer}
  .maker{font-size:11px;color:var(--muted)}
  .model{font-weight:600}
  .price{font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;white-space:nowrap}
  .price small{font-size:11px;color:var(--muted);font-weight:400}
  .dim{color:var(--muted)}
  .active-price{color:var(--accent2)}
  .badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:6px;background:var(--panel2);color:var(--muted);margin-left:6px;border:1px solid var(--line)}
  .badge.new{background:rgba(239,68,68,.15);color:#fca5a5;border-color:#7f1d1d}
  .badge.ng{background:rgba(245,158,11,.12);color:#fcd34d;border-color:#854d0e}
  .badge.doc{font-size:14px;font-weight:800;background:#2563eb;color:#fff;border-color:#1d4ed8;padding:2px 9px;letter-spacing:1px;box-shadow:0 0 0 1px rgba(37,99,235,.4)}
  .memo{color:var(--warn);font-size:12px;margin-top:3px}
  .goo{display:inline-block;margin-top:4px;font-size:11px;color:#7dd3fc;text-decoration:none}
  .goo:hover{text-decoration:underline}
  .negin{color:var(--muted);font-size:12px}
  tr.recent td{background:rgba(239,68,68,.06)}
  /* editor */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;z-index:40}
  .overlay.open{display:flex}
  .sheet{background:var(--panel);width:100%;max-width:560px;border-radius:16px 16px 0 0;border:1px solid var(--line);padding:16px;max-height:88vh;overflow:auto}
  .sheet h3{margin:0 0 12px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .field input,.field textarea,.field select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sheet-actions{display:flex;gap:8px;justify-content:space-between;margin-top:6px}
  .empty{text-align:center;color:var(--muted);padding:40px}
  @media(min-width:700px){ .overlay{align-items:center} .sheet{border-radius:16px} }
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <div class="title">📈 相場表アプリ <small>野田ヤード / v1.5（書マーク手動消去）</small></div>
  <div class="toolbar">
    <input id="q" class="search" placeholder="車種・型式で検索（例: アルファード MNH15 / セレナ C26）">
    <div class="awtoggle" id="awToggle">
      <button data-aw="1" class="on">アルミ有(AW)</button>
      <button data-aw="0">アルミ無(レス)</button>
    </div>
    <button class="btn green" id="addBtn">＋新規</button>
    <button class="btn" id="exportBtn">CSV出力</button>
    <button class="btn" id="importBtn">CSV取込</button>
    <input type="file" id="fileIn" accept=".csv" class="hidden">
    <button class="btn" id="syncBtn">🔄 更新</button>
    <button class="btn" id="cfgBtn">⚙ 同期設定</button>
    <button class="btn" id="taxBtn">🧮 還付計算</button>
  </div>
  <div class="chips" id="makers"></div>
  <div class="meta" id="syncbar" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px">
    <span id="syncStatus">同期オフ（ローカル保存）</span>
  </div>
</header>

<main>
  <div class="meta" id="meta"></div>
  <table>
    <thead><tr>
      <th>車種・型式</th>
      <th>AW</th><th>レス</th><th>ネギン</th><th>年式</th><th>車両重量</th><th>更新日</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty hidden" id="empty">該当なし</div>
</main>

<!-- editor -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h3 id="edTitle">編集</h3>
    <div class="field"><label>メーカー</label>
      <select id="edMaker"></select></div>
    <div class="field"><label>車種・型式</label>
      <input id="edModel" placeholder="アルファード 3000 後期 MNH15"></div>
    <div class="grid2">
      <div class="field"><label>AW（アルミ有）売値</label><input id="edAw" placeholder="320"></div>
      <div class="field"><label>レス（アルミ無）売値</label><input id="edLess" placeholder="—"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>ネギン</label><input id="edNegin" placeholder="264 / 不可"></div>
      <div class="field"><label>更新日</label><input id="edDate" type="date"></div>
    </div>
    <div class="field"><label>年式（型式から調べた生産期間）</label>
      <div style="display:flex;gap:8px">
        <input id="edYear" placeholder="例: H14～20 / 2002～2008" style="flex:1">
        <button type="button" class="btn" id="gooBtn">🔎 グーネット</button>
      </div></div>
    <div class="field"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="edNoDoc" style="width:auto"> 📄 「書」マークを消す（書類マーク非表示）</label></div>
    <div class="field"><label>メモ</label><textarea id="edMemo" rows="2" placeholder="テール2本 / 外装関係ない 等"></textarea></div>
    <div class="sheet-actions">
      <button class="btn" id="delBtn" style="color:#fca5a5">削除</button>
      <div style="display:flex;gap:8px">
        <button class="btn" id="cancelBtn">閉じる</button>
        <button class="btn primary" id="saveBtn">保存（更新日=今日）</button>
      </div>
    </div>
  </div>
</div>

<!-- 重量税 還付計算 -->
<div class="overlay" id="taxOverlay">
  <div class="sheet">
    <h3>🧮 重量税 還付計算</h3>
    <div id="taxTarget" class="dim" style="font-size:12px;margin-bottom:10px"></div>
    <div class="grid2">
      <div class="field"><label>重量区分（0.5t刻み）</label>
        <select id="txBracket">
          <option value="">— 選択 —</option>
          <option value="軽">軽自動車</option>
          <option value="1.0t以下">1.0t以下（〜1,000kg）</option>
          <option value="1.5t以下">1.5t以下（〜1,500kg）</option>
          <option value="2.0t以下">2.0t以下（〜2,000kg）</option>
          <option value="2.5t以下">2.5t以下（〜2,500kg）</option>
          <option value="3.0t以下">3.0t以下（〜3,000kg）</option>
        </select></div>
      <div class="field"><label>車検満了（令和）</label>
        <div style="display:flex;gap:6px;align-items:center">
          <span>R</span><input id="txRY" type="number" inputmode="numeric" placeholder="8" style="width:64px">
          <span>年</span><input id="txRM" type="number" inputmode="numeric" placeholder="12" style="width:64px"><span>月</span>
        </div></div>
    </div>
    <div class="grid2">
      <div class="field"><label>車齢区分</label>
        <select id="txAge">
          <option value="u13">13年未満（標準）</option>
          <option value="o13">13年経過</option>
          <option value="o18">18年経過</option>
          <option value="eco">エコカー（本則）</option>
        </select></div>
      <div class="field"><label>手続き調整（月）<span class="dim">／1か月半=−1</span></label><input id="txLag" type="number" value="1"></div>
    </div>
    <div class="field"><label>自賠責 月額（円）<span class="dim">／既定500</span></label><input id="txJibai" type="number" value="500" style="width:130px"></div>
    <div id="taxResult" style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;line-height:1.9"></div>
    <div class="sheet-actions" style="margin-top:12px"><span></span>
      <button class="btn primary" id="taxClose">閉じる</button></div>
  </div>
</div>

/* ===== 双方向同期（Google スプレッドシート / Apps Script） ===== */
const API_KEY="soba_api", CACHE_KEY="soba_v01_cache";
const DEFAULT_API="https://script.google.com/macros/s/AKfycbzqjqZi07taoyE-vqtaJ--GX0C6q3g0Q6adw_xkmvyTzAmuOk-wQehAGeHKxc2q-DL_rA/exec";
function API(){ return (localStorage.getItem(API_KEY)||DEFAULT_API).trim(); }
function setStatus(t){ const e=document.getElementById("syncStatus"); if(e) e.textContent=t; }
function jsonp(url){ return new Promise((res,rej)=>{
  const cb="__sjp"+Date.now()+Math.floor(Math.random()*1000);
  const s=document.createElement("script");
  const done=(ok,d)=>{ try{delete window[cb];}catch(_){} s.remove(); ok?res(d):rej(new Error("net")); };
  window[cb]=(d)=>done(true,d);
  s.onerror=()=>done(false);
  s.src=url+(url.indexOf("?")>=0?"&":"?")+"action=list&callback="+cb;
  document.body.appendChild(s);
  setTimeout(()=>{ if(window[cb]) done(false); }, 15000);
});}
async function syncPull(){
  if(!API()){ setStatus("同期オフ（ローカル保存）"); return; }
  setStatus("同期中…");
  try{
    const d=await jsonp(API());
    if(d&&d.ok&&Array.isArray(d.rows)){
      DATA=d.rows.map(r=>({id:String(r.id),m:r.m,n:r.n,aw:String(r.aw||""),l:String(r.l||""),g:String(r.g||""),y:String(r.y||""),memo:r.memo||"",d:normDate(r.d)}));
      localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
      buildChips(); render();
      setStatus("✔ シート同期済 "+new Date().toLocaleTimeString("ja-JP"));
    } else setStatus("⚠ 同期エラー（ローカル表示）");
  }catch(e){ setStatus("⚠ オフライン（ローカル表示）"); }
}
function postNoCors(payload){
  return fetch(API(),{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
}
function pushUpsert(r){ if(!API())return; setStatus("保存をシートへ送信中…");
  postNoCors({action:"upsert",row:r}).then(()=>setStatus("☁ 保存送信済（🔄更新で確認）")).catch(()=>setStatus("⚠ 送信失敗")); }
function pushDelete(id){ if(!API())return;
  postNoCors({action:"delete",id:id}).then(()=>setStatus("☁ 削除送信済")).catch(()=>{}); }
function pushAll(){ if(!API())return;
  if(!confirm("現在の全"+DATA.length+"件を「相場DB」タブへ書き出します（タブを上書き）。よろしいですか？")) return;
  DATA.forEach((r,i)=>{ if(!/^r\d/.test(r.id)) r.id="r"+("000"+(i+1)).slice(-4); });
  persist(); setStatus("全件アップロード中…");
  postNoCors({action:"replaceAll",rows:DATA}).then(()=>{ setStatus("☁ アップロード送信済（数秒後に🔄）"); setTimeout(syncPull,4000); }).catch(()=>setStatus("⚠ 失敗")); }
function configSync(){
  const url=prompt("Apps Script ウェブアプリの URL（末尾 /exec）を貼り付け。\n（空欄にすると同期オフ）", API());
  if(url===null) return;
  localStorage.setItem(API_KEY, url.trim());
  if(url.trim()){ if(confirm("接続しました。今の "+DATA.length+" 件をシートへ初回アップロードしますか？（初回のみ。既にDBがある場合はキャンセル→🔄更新）")) pushAll(); else syncPull(); }
  else setStatus("同期オフ（ローカル保存）");
}

function loadData(){

  try{ saved = JSON.parse(localStorage.getItem(LS_KEY)||"{}"); }catch(e){}

    map[id] = {id, m:r[0], n:r[1], aw:r[2], l:r[3], g:r[4], memo:r[5], y:lookupYear(r[1]), d:""};
  });
  // overlay saved edits / new rows
  Object.values(saved).forEach(rec=>{ map[rec.id]=rec; });
  return Object.values(map);
}

}

function num(s){ const m=String(s||"").match(/\d+(\.\d+)?/); return m?parseFloat(m[0]):null; }
function normDate(s){
  if(!s) return "";
  s=String(s);
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const t=new Date(s);
  if(!isNaN(t.getTime())) return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
  return s;
}

function toWareki(s){ const ys=String(s||"").match(/\d{4}/g); if(!ys) return ""; return ys.map(wareki).join("〜"); }

function toCSV(){
  const head=["メーカー","車種・型式","AW","レス","ネギン","年式","車両重量kg","メモ","更新日"];
  const esc=s=>{ s=String(s==null?"":s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const lines=[head.join(",")];
  DATA.slice().sort((a,b)=>MAKERS.indexOf(a.m)-MAKERS.indexOf(b.m)||a.n.localeCompare(b.n,"ja"))
    .forEach(r=>lines.push([r.m,r.n,r.aw,r.l,r.g,r.y,lookupWeight(r.n),r.memo,r.d].map(esc).join(",")));
  return "﻿"+lines.join("\r\n");
}

document.getElementById("fileIn").onchange=(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    const rows=parseCSV(rd.result);
    if(rows.length<2){ alert("データが読めません"); return; }
    if(!confirm("CSVの内容で全データを置き換えます。よろしいですか？")) return;
    DATA = rows.slice(1).filter(c=>c[1]).map((c,i)=>({id:"c"+i,m:c[0]||"トヨタ",n:c[1],aw:c[2]||"",l:c[3]||"",g:c[4]||"",y:c[5]||"",memo:c[6]||"",d:c[7]||""}));
    persist(); buildChips(); render();
  };
  rd.readAsText(f);
};
function parseCSV(text){
  text=text.replace(/^﻿/,"");
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else { if(ch==='"') q=true; else if(ch===','){row.push(cur);cur="";} else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur="";} else if(ch!=='\r') cur+=ch; }
  }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function recalcTax(){
  const ry=parseInt(document.getElementById("txRY").value,10);
  const rm=parseInt(document.getElementById("txRM").value,10);
  const age=document.getElementById("txAge").value;
  const lag=parseInt(document.getElementById("txLag").value,10)||0;
  const box=document.getElementById("taxResult");
  const br=document.getElementById("txBracket").value;
  if(!br){ box.innerHTML='<span class="dim">重量区分を選択してください</span>'; return; }
  const monthly=TAXM[br][age];
  let monthsLine, months=null;
  if(ry>0 && rm>=1 && rm<=12){
    const endIdx=(2018+ry)*12+rm;            // 満了の年月インデックス
    const now=new Date(); const nowIdx=now.getFullYear()*12+(now.getMonth()+1);
    months=Math.max(0, endIdx-nowIdx-lag);
    const diff=endIdx-nowIdx;
    monthsLine=`還付対象月数：<b>${months}か月</b> <span class="dim">（満了R${ry}/${rm} − 今${now.getFullYear()}/${now.getMonth()+1} ＝ ${diff}か月、手続き調整 −${lag}）</span>`;
  } else {
    monthsLine='還付対象月数：<span class="dim">車検満了（令和 年・月）を入力してください</span>';
  }
  let refundLine="";
  if(months!=null){
    const jrate=parseInt(document.getElementById("txJibai").value,10)||0;
    const wtax=monthly*months, jibai=jrate*months, total=wtax+jibai;
    refundLine=`<div style="margin-top:8px;border-top:1px dashed var(--line);padding-top:8px">`+
      `重量税 還付：<b>${yen(wtax)}</b> <span class="dim">(${yen(monthly)}×${months})</span><br>`+
      `自賠責 還付：<b>${yen(jibai)}</b> <span class="dim">(${yen(jrate)}×${months})</span>`+
      `<div style="margin-top:6px;font-size:17px">合計 還付見込：<b style="color:var(--accent2)">${yen(total)}</b></div></div>`;
  }
  box.innerHTML=
    `区分：<b>${br}</b>（${ {u13:"13年未満",o13:"13年経過",o18:"18年経過",eco:"エコカー"}[age] }）<br>`+
    `月額重量税：<b>${yen(monthly)}</b>／月<br>`+
    monthsLine+refundLine;
}
function openTaxCalc(weightStr, name, maker){
  const m=String(weightStr||"").match(/\d+/);
  const kg=m?parseInt(m[0],10):0;
  document.getElementById("txBracket").value = isKei(maker,name) ? "軽" : bracketByKg(kg);
  document.getElementById("txAge").value = isEco(name) ? "eco" : "u13";
  document.getElementById("txLag").value="1";
  document.getElementById("txJibai").value="500";
  document.getElementById("txRY").value=""; document.getElementById("txRM").value="";
  document.getElementById("taxTarget").textContent = name? ("対象：" + name + (weightStr?("（重量目安 "+weightStr+"kg）"):"")) : "手入力でも計算できます（重量区分を選択）";
  recalcTax();
  document.getElementById("taxOverlay").classList.add("open");
}
["txBracket","txRY","txRM","txAge","txLag","txJibai"].forEach(id=>{
  const el=document.getElementById(id); el.addEventListener("input",recalcTax); el.addEventListener("change",recalcTax);
});
document.getElementById("taxBtn").onclick=()=>openTaxCalc("","");
document.getElementById("taxClose").onclick=()=>document.getElementById("taxOverlay").classList.remove("open");
document.getElementById("taxOverlay").onclick=(e)=>{ if(e.target.id==="taxOverlay") document.getElementById("taxOverlay").classList.remove("open"); };

document.getElementById("syncBtn").onclick=syncPull;
document.getElementById("cfgBtn").onclick=configSync;

buildChips(); render();
if(API()) syncPull(); else setStatus("同期オフ（ローカル保存）");
</script>
</body>
</html>
